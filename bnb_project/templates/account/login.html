{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
  <h1>Login</h1>
  {% if form %}
    <form method="post" action=".{% url 'account_login' %}">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Log in</button>
    </form>
  {% else %}
    <p>Login form not available.</p>
  {% endif %}
{% endblock %}
